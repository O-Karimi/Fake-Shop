<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>First Page!</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #333;
            color: white;
            padding: 1em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        main {
            padding: 1em;
        }
        nav {
            display: flex;
            background-color: #444;
            color: white;
            text-decoration: none;
            justify-content: space-around;
            padding: 0.5em;
        }
        h1 a {
            color: white;
            text-decoration: none;
            padding: 0.5em 1em;
        }
        nav a {
            color: white;
            text-decoration: none;
            padding: 0.5em 1em;
        }
        nav a:hover {
            background-color: #555;
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 1em;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>
<body>
    <header>
        <h1><a href="#">Fake Store</a></h1>
        <form>
            <input type="search" placeholder="Search..." style="margin-top: 1em;">
            <button type="submit">Search</button>
        </form>        
    </header>
    <nav>
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
    <main>
        <section>
            <h2>About</h2>
            <p>This is a simple website template.</p>
            <h2>Most Sold Products</h2>
            <div id="most-sold-products">
                <span>Product 1: $10</span>
                <span>Product 2: $20</span>
                <span>Product 3: $30</span>
            </div>
            <h2>Contact</h2>
            <p>Email: info@fakestore.com</p>
            <p>Phone: (123) 456-7890</p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Fake Store</p>
    </footer>
</body>
</html>
