version: '3.8'

services:
  backend:
    build: /Fake-Shop/Fake-Shop-Back
    ports:
      - "5000:5000"
    env_file:
      - /Fake-Shop/Fake-Shop-Back/.env
    restart: unless-stopped

  frontend:
    build: /Fake-Shop/Fake-Shop-Front
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped